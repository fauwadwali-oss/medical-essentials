name: Refresh Mastering Essentials shorts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch shorts from YouTube Data API
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: UC8Ux9uG3hYIjKdym7mD-8GA
          OUTPUT_PATH: data/shorts.json
        run: node scripts/fetch-youtube-shorts.mjs

      - name: Commit updated shorts
        run: |
          if git diff --quiet -- data/shorts.json; then
            echo "No shorts changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/shorts.json
          git commit -m "Refresh Mastering Essentials shorts"
          git push
